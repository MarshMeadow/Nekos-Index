<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko’s Index – Secure Browser Check</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 50px;
        }
        .result {
            display: none;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #1f1f1f;
            color: #e0e0e0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

<h1>Neko’s Index</h1>
<p>Please ensure you are using a secure and up-to-date browser before accessing Neko’s Index.</p>
<button id="checkButton">Check Security</button>

<div class="result" id="result"></div>

<script>
    document.getElementById('checkButton').onclick = function() {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';

        const userAgent = navigator.userAgent;
        const isModernBrowser = /Chrome|Firefox|Safari|Edge/i.test(userAgent) && !/OPR|Edg\/\d+/.test(userAgent);

        if (isModernBrowser) {
            resultDiv.innerHTML = "<p style='color: green;'>Your browser is secure and up-to-date.</p>";
            resultDiv.style.display = 'block';

            setTimeout(() => {
                window.location.href = "https://nekossources.netlify.app/list";
            }, 2000);
        } else {
            resultDiv.innerHTML = "<p style='color: red;'>Warning: Your browser is outdated or not secure. Please update your browser.</p>";
            resultDiv.style.display = 'block';

            setTimeout(() => {
                window.location.href = "https://nekossources.netlify.app/list";
            }, 2000);
        }
    };
</script>

</body>
</html>
