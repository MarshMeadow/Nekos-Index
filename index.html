<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Verifying...</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    .box {
        text-align: center;
        padding: 20px;
    }

    h1 {
        font-size: 20px;
        margin-bottom: 10px;
        color: #9f9f9f;
    }

    button {
        margin-top: 15px;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #1f1f1f;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #2a2a2a;
    }

    .small {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="box">
    <h1 id="status">Checking verification...</h1>
    <div id="action"></div>
</div>

<script>
const TARGET_URL = "https://nekos-index.netlify.app/list";
const KEY = "nekos_verified";

// If already verified → instant redirect
if (localStorage.getItem(KEY) === "true") {
    location.replace(TARGET_URL);
}

// Otherwise show verify button
const status = document.getElementById("status");
const action = document.getElementById("action");

status.textContent = "Verification required";

const btn = document.createElement("button");
btn.textContent = "Verify & Continue";

btn.onclick = () => {
    localStorage.setItem(KEY, "true"); // save once
    status.textContent = "Verified! Redirecting...";

    // fastest safe redirect
    setTimeout(() => {
        location.replace(TARGET_URL);
    }, 150);
};

action.appendChild(btn);
</script>

</body>
</html>
