<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko Sources Secure Browser Check</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .result {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Neko Sources Secure Browser Check</h1>
<p>Please ensure you are using a secure browser before accessing Neko Sources.</p>
<button id="checkButton">Check Security</button>

<div class="result" id="result"></div>

<script>
    document.getElementById('checkButton').onclick = function() {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'none';

        const protocol = window.location.protocol;

        if (protocol !== 'https:') {
            resultDiv.innerHTML = "<p style='color: red;'>Warning: You are not using HTTPS!</p>";
            resultDiv.style.display = 'block';
            return;
        }

        // Check for Cloudflare headers
        fetch(window.location.href).then(response => {
            const securityHeader = response.headers.get('CF-RA-Wavelength');

            if (securityHeader) {
                resultDiv.innerHTML = "<p style='color: green;'>Your connection is secured by Cloudflare.</p>";
                resultDiv.style.display = 'block';

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = "https://nekossources.netlify.app";  // Redirect to Neko Sources
                }, 2000);
            } else {
                resultDiv.innerHTML = "<p style='color: red;'>Warning: Your connection is not secured by Cloudflare!</p>";
                resultDiv.style.display = 'block';

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = "https://nekossources.netlify.app";  // Redirect to Neko Sources
                }, 2000);
            }
        }).catch(error => {
            resultDiv.innerHTML = "<p style='color: red;'>Error: Unable to check the security. Please try again.</p>";
            resultDiv.style.display = 'block';

            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = "https://nekossources.netlify.app";  // Redirect to Neko Sources
            }, 2000);
        });
    };
</script>

</body>
</html>
